<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — AI Negotiation</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>

  <nav>
    <a href="start-session.html" class="logo">🧠 AI Negotiation</a>
    <button class="hamburger" aria-label="Toggle navigation menu" onclick="document.querySelector('nav ul').classList.toggle('active')">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul>
      <li><a href="start-session.html">Home</a></li>
      <li><a href="start-session.html">New Session</a></li>
      <li><a href="#" id="nav-export">Export Data</a></li>
    </ul>
  </nav>

  <main id="content">
    <div class="auth-container">
      <div class="auth-card">
        <h1>Create Your Account</h1>
        <p class="auth-subtitle">Your demographic info helps us study AI negotiation bias</p>

        <form id="register-form" novalidate>
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Choose a username" autocomplete="username">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Choose a password" autocomplete="new-password">
          </div>

          <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="18" max="99" required placeholder="Your age">
          </div>

          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
              <option value="">Select your gender</option>
              <option value="prefer_not_to_say">Prefer not to say</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="non-binary">Non-binary</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="nationality">Nationality</label>
            <select id="nationality" name="nationality" required>
              <option value="">Select your nationality</option>
              <option value="FR">France</option>
              <option value="UA">Ukraine</option>
              <option value="TR">Turkey</option>
              <option value="GH">Ghana</option>
              <option value="US">United States</option>
              <option value="GB">United Kingdom</option>
              <option value="DE">Germany</option>
              <option value="ES">Spain</option>
              <option value="IT">Italy</option>
              <option value="MA">Morocco</option>
              <option value="DZ">Algeria</option>
              <option value="TN">Tunisia</option>
              <option value="SN">Senegal</option>
              <option value="CN">China</option>
              <option value="JP">Japan</option>
              <option value="BR">Brazil</option>
              <option value="CA">Canada</option>
              <option value="BE">Belgium</option>
              <option value="NL">Netherlands</option>
              <option value="PL">Poland</option>
            </select>
          </div>

          <div class="form-group">
            <label for="education">Education Level</label>
            <select id="education" name="education" required>
              <option value="">Select your education level</option>
              <option value="high_school">High School</option>
              <option value="bachelors">Bachelor's</option>
              <option value="masters">Master's</option>
              <option value="phd">PhD</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="experience">Negotiation Experience</label>
            <select id="experience" name="experience" required>
              <option value="">Select your experience level</option>
              <option value="none">None</option>
              <option value="some">Some</option>
              <option value="experienced">Experienced</option>
              <option value="professional">Professional</option>
            </select>
          </div>

          <button type="submit" id="register-btn" class="btn-primary btn-full">Create Account</button>
        </form>

        <div id="register-error" class="error-msg hidden"></div>

        <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </main>

  <footer>
    Junia — M1 Research Project 2026 | AI &amp; Negotiation Bias Study
  </footer>

  <div id="modal-overlay" class="hidden"></div>

</body>
</html>
