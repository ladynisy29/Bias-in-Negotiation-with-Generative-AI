<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Negotiation AI</title>
    <link rel="stylesheet" href="../assets/css/chat.css">
</head>
<body>
    <div class="container">
        <div class="chat-section">
            <div class="chat-header">
                <h2>Negotiation Room</h2>
                <span id="turn-counter">Turn: 0 / 5</span>
            </div>
            <div class="chat-history" id="chat-history">
                <div class="message ai-message">
                    <p>Hello, I am the factory owner. What is your initial offer?</p>
                </div>
            </div>
            <div class="chat-input-container">
                <input type="number" id="offer-input" placeholder="Your offer ($)" required>
                <input type="text" id="message-input" placeholder="Type your argument..." required>
                <button id="send-btn">Send</button>
            </div>
        </div>

        <div class="tracker-section">
            <div class="tracker-header">
                <h2>Offer History</h2>
            </div>
            <div class="tracker-content">
                <table id="offer-table">
                    <thead>
                        <tr>
                            <th>Turn</th>
                            <th>Buyer (You)</th>
                            <th>Seller (AI)</th>
                        </tr>
                    </thead>
                    <tbody id="offer-tbody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../services_api/chat_api_client.js"></script>
</body>
</html>
