<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Participant Form - AI Negotiation</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <nav>
    <a href="Onboarding.html" class="logo">AI Negotiation</a>
    <button class="hamburger" aria-label="Toggle navigation menu" onclick="appLayout.toggleNavigation()">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul>
      <li><a href="Onboarding.html">Participant Form</a></li>
      <li><a href="Chat.html">Negotiation</a></li>
      <li><button type="button" class="btn-secondary" onclick="appLayout.toggleTheme()">Theme</button></li>
    </ul>
  </nav>

  <main class="container mt-4 mb-4">
    <section class="card-sm" style="max-width: 720px; margin: 0 auto;">
      <h1 class="mb-2">Participant Information</h1>
      <p class="text-muted mb-3">All fields are optional. The AI will greet you first in chat, then you can send your first offer there.</p>

      <form id="onboarding-form">
        <div class="grid-2">
          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender">
              <option value="">Select (optional)</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Transgender">Transgender</option>
              <option value="Prefer not to say">Prefer not to say</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="age">Age</label>
            <input id="age" name="age" type="number" min="0" placeholder="Optional" />
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label for="location">Location</label>
            <input id="location" name="location" type="text" placeholder="Optional" />
          </div>
          <div class="form-group">
            <label for="nationality">Nationality</label>
            <input id="nationality" name="nationality" type="text" placeholder="Optional" />
          </div>
        </div>

        <button type="submit" id="next-button" class="btn-primary">Next</button>
        <p id="onboarding-status" class="helper-text mt-2"></p>
        <p id="onboarding-error" class="error-msg hidden"></p>
      </form>
    </section>
  </main>

  <footer>Junia - M1 Research Project 2026 | AI and Negotiation Bias Study</footer>

  <script src="./BaseLayout.js"></script>
  <script type="module" src="./Onboarding.js"></script>
</body>
</html>
