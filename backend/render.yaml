services:
  - type: web
    name: bias-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn core.wsgi:application
    healthCheckPath: /api/auth/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "true"
      - key: ALLOW_DEV_AUTH_ENDPOINTS
        value: "false"
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_TIMEOUT_SECONDS
        value: "8"
      - key: OPENAI_MAX_RETRIES
        value: "2"
      - key: ACCESS_TOKEN_TTL_HOURS
        value: "12"
      - key: LOG_LEVEL
        value: INFO
      - key: SESSION_TRANSCRIPT_EMAIL_ENABLED
        value: "false"
      - key: SESSION_TRANSCRIPT_EMAIL_SUBJECT_PREFIX
        value: Bias
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DB_POOLER_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SESSION_TRANSCRIPT_EMAIL_RECIPIENTS
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        sync: false
      - key: EMAIL_USE_SSL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
